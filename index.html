<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feirão Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(180deg,#ff2e63,#ff4f7b,#ff6b8f);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* CARD PRINCIPAL */

.card{
background:white;
max-width:420px;
width:100%;
padding:35px;
border-radius:22px;
text-align:center;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* TITULO */

.title{
font-size:42px;
font-weight:800;
color:#ff2e63;
margin-bottom:10px;
letter-spacing:2px;
}

/* SUB */

.subtitle{
font-size:16px;
color:#444;
margin-bottom:25px;
}

/* BENEFICIOS */

.benefits{
text-align:left;
margin-bottom:25px;
}

.benefits div{
margin-bottom:10px;
font-size:15px;
}

/* BOTÃO */

.cta{
display:block;
background:linear-gradient(90deg,#ff2e63,#ff4f7b);
color:white;
text-decoration:none;
padding:18px;
border-radius:12px;
font-weight:700;
font-size:18px;
transition:0.3s;
box-shadow:0 10px 25px rgba(255,0,90,0.4);
}

.cta:hover{
transform:scale(1.05);
}

/* AVISO */

.notice{
margin-top:15px;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="card">

<div class="title">
FEIRÃO
</div>

<div class="subtitle">
Aproveite ofertas especiais disponíveis agora.
</div>

<div class="benefits">
<div>✔ Descontos especiais</div>
<div>✔ Processo simples e rápido</div>
<div>✔ Acesso imediato às ofertas</div>
</div>

<a class="cta" href="https://cliente-c5ef81.netlify.app/">
VER OFERTAS
</a>

<div class="notice">
Você será direcionado para a página de ofertas.
</div>

</div>

</body>
</html>
