<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Feirão</title>

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --bg: #f1f5ff;
    --card: #ffffff;
    --text: #1f2937;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HERO */
.hero {
    background: linear-gradient(90deg, #2563eb, #1e40af);
    color: white;
    text-align: center;
    padding: 40px 20px;
}

.hero h1 {
    margin: 0;
    font-size: 32px;
}

.hero p {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.9;
}

/* CARD */
.card {
    max-width: 500px;
    margin: -30px auto 0 auto;
    background: var(--card);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(37,99,235,0.2);
    text-align: center;
}

/* TIMER */
.timer {
    font-size: 34px;
    color: var(--primary);
    font-weight: bold;
    margin: 15px 0;
}

/* ALERT */
.alert {
    background: #fee2e2;
    color: #b91c1c;
    padding: 10px;
    border-radius: 10px;
    font-size: 13px;
}

/* ONLINE */
.online {
    margin-top: 10px;
    font-size: 13px;
    color: #2563eb;
}

/* PROGRESS */
.progress-box {
    margin-top: 20px;
    height: 10px;
    background: #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #2563eb, #60a5fa);
}

/* BENEFITS */
.benefits {
    margin-top: 20px;
    text-align: left;
    font-size: 14px;
}

.benefits div {
    margin-bottom: 8px;
}

/* BOTÃO FIXO */
.cta-fixed {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 15px;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
}

.cta-fixed a {
    display: block;
    text-align: center;
    padding: 18px;
    border-radius: 12px;
    background: linear-gradient(90deg, #2563eb, #1e40af);
    color: white;
    font-weight: bold;
    text-decoration: none;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="hero">
    <h1>🔥 MEGA FEIRÃO</h1>
    <p>Descontos exclusivos liberados por tempo limitado</p>
</div>

<div class="card">

    <div class="timer" id="timer">03:00</div>

    <div class="alert">⚠️ Últimas vagas disponíveis</div>

    <div class="online" id="online">👥 127 pessoas vendo agora</div>

    <div class="progress-box">
        <div id="progress" class="progress"></div>
    </div>

    <div class="benefits">
        <div>✔ Desconto exclusivo</div>
        <div>✔ Acesso imediato</div>
        <div>✔ Oferta válida só hoje</div>
    </div>

</div>

<div class="cta-fixed">
    <a href="https://keen-brioche-cd458a.netlify.app/">
        🔥 GARANTIR DESCONTO AGORA
    </a>
</div>

<script>
// PROGRESSO
let percent = 0;
const progress = document.getElementById("progress");

setInterval(() => {
    percent++;
    progress.style.width = percent + "%";
    if (percent >= 100) percent = 0;
}, 40);

// TIMER
let time = 180;
const timer = document.getElementById("timer");

setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;

    timer.innerText =
        (min < 10 ? "0" : "") + min + ":" +
        (sec < 10 ? "0" : "") + sec;

    if (time > 0) time--;
}, 1000);

// ONLINE
const online = document.getElementById("online");

setInterval(() => {
    let num = Math.floor(Math.random() * 60) + 120;
    online.innerText = "👥 " + num + " pessoas vendo agora";
}, 3000);
</script>

</body>
</html>
